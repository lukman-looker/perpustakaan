<!DOCTYPE html>
<html>
<head>
  <title>Sistem Perpustakaan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      padding: 20px; 
      max-width: 600px; 
      margin: auto; 
      background-color: #f7f7f7;
    }
    h2 {
      text-align: center;
      color: #333;
    }
    #reader { 
      width: 100%; 
      margin: 20px auto; 
      border: 2px solid #ddd;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }
    .card { 
      background: #ffffff; 
      padding: 15px 20px; 
      margin: 15px 0; 
      border-radius: 10px; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .card h3 {
      margin-top: 0;
      margin-bottom: 10px;
      color: #007bff;
      border-bottom: 1px solid #eee;
      padding-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px dashed #f0f0f0;
    }
    .detail-row:last-child { border-bottom: none; }
    .label { font-weight: 600; color: #555; }
    .value { color: #222; text-align: right; }
    .input-group { margin: 15px 0; }
    label { font-weight: 600; color: #555; }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 16px;
    }
    button { 
      width: 100%;
      padding: 12px; 
      background: #007bff; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      font-size: 16px;
      cursor: pointer; 
      box-shadow: 0 3px 0 #0056b3;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>

  <h2><i class="fas fa-book"></i> Sistem Peminjaman Buku</h2>

  <div id="reader"></div>

  <!-- DATA ANGGOTA -->
  <div class="card">
    <h3><i class="fas fa-user"></i> Data Anggota</h3>
    <div class="detail-row">
      <span class="label">Kode Anggota</span>
      <span class="value" id="kodeAnggota">-</span>
    </div>
    <div class="detail-row">
      <span class="label">Nama Lengkap</span>
      <span class="value" id="namaAnggota">-</span>
    </div>
    <div class="detail-row">
      <span class="label">Tipe</span>
      <span class="value" id="tipeAnggota">-</span>
    </div>
    <div class="detail-row">
      <span class="label">Keterangan</span>
      <span class="value" id="ketAnggota">-</span>
    </div>
  </div>

  <!-- DATA BUKU -->
  <div class="card">
    <h3><i class="fas fa-book-open"></i> Data Buku</h3>
    <div class="detail-row">
      <span class="label">Kode Buku</span>
      <span class="value" id="kodeBuku">-</span>
    </div>
    <div class="detail-row">
      <span class="label">Judul Buku</span>
      <span class="value" id="judulBuku">-</span>
    </div>
    <div class="detail-row">
      <span class="label">Stok Tersedia</span>
      <span class="value" id="stokBuku">-</span>
    </div>
  </div>

  <!-- FORM -->
  <div class="input-group">
    <label for="lamaPinjam"><i class="fas fa-clock"></i> Lama Pinjam (hari):</label>
    <input type="number" id="lamaPinjam" value="7" min="1">
  </div>

  <button onclick="prosesPinjam()">
    <i class="fas fa-check-circle"></i> Proses Peminjaman
  </button>

  <script>
    const URL_GAS = "https://script.google.com/macros/s/AKfycbzmxtpqgacdxGgqgaIvHPh9uLwrNsvC-PBQotw4OeQAOgJ_4oLNezQjER1nxhaK4nPH/exec";

    let kodeAnggota = "";
    let kodeBuku = "";

    // Inisialisasi Scanner
    const scanner = new Html5Qrcode("reader");
    scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      qrCodeMessage => {
        const kode = qrCodeMessage.trim();
        if (kode.startsWith("S-") || kode.startsWith("G-") || kode.startsWith("O-")) {
          kodeAnggota = kode;
          document.getElementById("kodeAnggota").textContent = kodeAnggota;
          ambilDataAnggota(kode);
        } else if (kode.startsWith("B-")) {
          kodeBuku = kode;
          document.getElementById("kodeBuku").textContent = kodeBuku;
          ambilDataBuku(kode);
        }
      }
    );

    function ambilDataAnggota(kode) {
      const data = "action=getAnggota&kode=" + encodeURIComponent(kode);
      
      fetch(URL_GAS, {
        method: "POST",
        body: data,
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        }
      })
      .then(res => res.json())
      .then(response => {
        console.log(response);
        if (response.status === "success" && response.data) {
          document.getElementById("namaAnggota").textContent = response.data.nama;
          document.getElementById("tipeAnggota").textContent = response.data.tipe;
          document.getElementById("ketAnggota").textContent = response.data.keterangan;
        } else {
          document.getElementById("namaAnggota").textContent = "Tidak ditemukan";
        }
      })
      .catch(err => {
        console.error(err);
        alert("Gagal ambil data anggota");
      });
    }

    function ambilDataBuku(kode) {
      const data = "action=getBuku&kode=" + encodeURIComponent(kode);
      
      fetch(URL_GAS, {
        method: "POST",
        body: data,
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        }
      })
      .then(res => res.json())
      .then(response => {
        console.log(response);
        if (response.status === "success" && response.data) {
          document.getElementById("judulBuku").textContent = response.data.judul;
          document.getElementById("stokBuku").textContent = response.data.stok;
        } else {
          document.getElementById("judulBuku").textContent = "Tidak ditemukan";
        }
      })
      .catch(err => {
        console.error(err);
        alert("Gagal ambil data buku");
      });
    }

    function prosesPinjam() {
      const lama = document.getElementById("lamaPinjam").value;
      if (!kodeAnggota || !kodeBuku) {
        alert("⚠️ Silakan scan kode anggota dan buku terlebih dahulu");
        return;
      }
      const data = "action=pinjamBuku&kodeAnggota=" + encodeURIComponent(kodeAnggota) + 
                   "&kodeBuku=" + encodeURIComponent(kodeBuku) + 
                   "&lamaPinjam=" + parseInt(lama);

      fetch(URL_GAS, {
        method: "POST",
        body: data,
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        }
      })
      .then(res => res.json())
      .then(response => {
        if (response.status === "success") {
          alert("✅ " + response.data.message);
          location.reload();
        } else {
          alert("❌ Error: " + response.message);
        }
      })
      .catch(err => alert("❌ Error: " + err));
    }
  </script>

</body>
</html>
